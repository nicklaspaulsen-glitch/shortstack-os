<?xml version="1.0" encoding="UTF-8"?>
<!--
  ShortStack mandala mark — monochrome (currentColor) variant.
  Use on colored backgrounds, embossed surfaces, or when print
  doesn't allow the gold gradient. Identical geometry to
  /icons/shortstack-logo.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="ShortStack">
  <title>ShortStack</title>
  <defs>
    <g id="ssm-wedge">
      <path d="M -6 -102 L 6 -102 L 8 -92 L 4 -86 L 4 -78 L -4 -78 L -4 -86 L -8 -92 Z" fill="currentColor"/>
    </g>
    <g id="ssm-ray">
      <path d="M 0 -70 L 7 -44 L 0 -48 L -7 -44 Z" fill="currentColor"/>
    </g>
    <g id="ssm-notch">
      <rect x="-1.2" y="-118" width="2.4" height="6" rx="0.6" fill="currentColor"/>
    </g>
  </defs>
  <g transform="translate(128 128)">
    <circle r="118" fill="none" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.2"/>
    <circle r="108" fill="none" stroke="currentColor" stroke-opacity="0.35" stroke-width="0.8"/>
    <g opacity="0.75">
      <use href="#ssm-notch" transform="rotate(0)"/><use href="#ssm-notch" transform="rotate(11.25)"/><use href="#ssm-notch" transform="rotate(22.5)"/><use href="#ssm-notch" transform="rotate(33.75)"/>
      <use href="#ssm-notch" transform="rotate(45)"/><use href="#ssm-notch" transform="rotate(56.25)"/><use href="#ssm-notch" transform="rotate(67.5)"/><use href="#ssm-notch" transform="rotate(78.75)"/>
      <use href="#ssm-notch" transform="rotate(90)"/><use href="#ssm-notch" transform="rotate(101.25)"/><use href="#ssm-notch" transform="rotate(112.5)"/><use href="#ssm-notch" transform="rotate(123.75)"/>
      <use href="#ssm-notch" transform="rotate(135)"/><use href="#ssm-notch" transform="rotate(146.25)"/><use href="#ssm-notch" transform="rotate(157.5)"/><use href="#ssm-notch" transform="rotate(168.75)"/>
      <use href="#ssm-notch" transform="rotate(180)"/><use href="#ssm-notch" transform="rotate(191.25)"/><use href="#ssm-notch" transform="rotate(202.5)"/><use href="#ssm-notch" transform="rotate(213.75)"/>
      <use href="#ssm-notch" transform="rotate(225)"/><use href="#ssm-notch" transform="rotate(236.25)"/><use href="#ssm-notch" transform="rotate(247.5)"/><use href="#ssm-notch" transform="rotate(258.75)"/>
      <use href="#ssm-notch" transform="rotate(270)"/><use href="#ssm-notch" transform="rotate(281.25)"/><use href="#ssm-notch" transform="rotate(292.5)"/><use href="#ssm-notch" transform="rotate(303.75)"/>
      <use href="#ssm-notch" transform="rotate(315)"/><use href="#ssm-notch" transform="rotate(326.25)"/><use href="#ssm-notch" transform="rotate(337.5)"/><use href="#ssm-notch" transform="rotate(348.75)"/>
    </g>
    <g>
      <use href="#ssm-wedge" transform="rotate(0)"/><use href="#ssm-wedge" transform="rotate(22.5)"/><use href="#ssm-wedge" transform="rotate(45)"/><use href="#ssm-wedge" transform="rotate(67.5)"/>
      <use href="#ssm-wedge" transform="rotate(90)"/><use href="#ssm-wedge" transform="rotate(112.5)"/><use href="#ssm-wedge" transform="rotate(135)"/><use href="#ssm-wedge" transform="rotate(157.5)"/>
      <use href="#ssm-wedge" transform="rotate(180)"/><use href="#ssm-wedge" transform="rotate(202.5)"/><use href="#ssm-wedge" transform="rotate(225)"/><use href="#ssm-wedge" transform="rotate(247.5)"/>
      <use href="#ssm-wedge" transform="rotate(270)"/><use href="#ssm-wedge" transform="rotate(292.5)"/><use href="#ssm-wedge" transform="rotate(315)"/><use href="#ssm-wedge" transform="rotate(337.5)"/>
    </g>
    <circle r="72" fill="none" stroke="currentColor" stroke-opacity="0.4" stroke-width="1"/>
    <g>
      <use href="#ssm-ray" transform="rotate(0)"/><use href="#ssm-ray" transform="rotate(45)"/><use href="#ssm-ray" transform="rotate(90)"/><use href="#ssm-ray" transform="rotate(135)"/>
      <use href="#ssm-ray" transform="rotate(180)"/><use href="#ssm-ray" transform="rotate(225)"/><use href="#ssm-ray" transform="rotate(270)"/><use href="#ssm-ray" transform="rotate(315)"/>
    </g>
    <circle r="42" fill="none" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.5"/>
    <g transform="translate(-28 -22)">
      <rect x="0"  y="30" width="56" height="11" rx="3" fill="currentColor" opacity="0.55"/>
      <rect x="4"  y="15" width="48" height="11" rx="3" fill="currentColor" opacity="0.80"/>
      <rect x="8"  y="0"  width="40" height="11" rx="3" fill="currentColor"/>
    </g>
  </g>
</svg>
