<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShortStack Prospector — Settings</title>
    <link rel="stylesheet" href="../popup/popup.css" />
    <style>
      html,
      body {
        width: 100%;
      }
      .options {
        max-width: 560px;
        margin: 0 auto;
        padding: 32px 24px;
      }
      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 16px;
      }
      .field input {
        font-family: inherit;
        font-size: 14px;
        padding: 10px 12px;
        background: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-sm);
        color: var(--color-text);
      }
      .field label {
        font-size: 12px;
        color: var(--color-muted);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <div class="options">
      <h1 style="font-size: 20px; margin: 0 0 24px">Settings</h1>
      <div class="field">
        <label for="baseUrl">ShortStack instance URL</label>
        <input
          id="baseUrl"
          type="url"
          placeholder="https://app.shortstack.work"
        />
        <p class="muted">
          Override only when self-hosting or pointing at a staging
          environment. Leave blank to use the production app.
        </p>
      </div>
      <div class="row">
        <button type="button" id="save" class="btn-primary">
          Save
        </button>
        <span id="status" class="muted"></span>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
