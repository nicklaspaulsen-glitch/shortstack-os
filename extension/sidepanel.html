<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShortStack OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06080c;
      --bg-card: #0c1017;
      --border: #1e2a3a;
      --gold: #C9A84C;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
      --error: #f43f5e;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, var(--gold), #A8893D);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 10px;
      color: #000;
    }
    .brand { font-weight: 700; font-size: 13px; }
    .brand span { color: var(--gold); }
    .header-actions { display: flex; gap: 6px; }
    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
    }
    .icon-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      max-width: 92%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg-user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.06));
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--text);
    }
    .msg-assistant {
      align-self: flex-start;
      background: var(--bg-card);
      border: 1px solid var(--border);
    }
    .msg-system {
      align-self: center;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      padding: 4px 12px;
    }
    .msg-tool {
      align-self: flex-start;
      background: rgba(16, 185, 129, 0.06);
      border: 1px solid rgba(16, 185, 129, 0.15);
      font-size: 11px;
      color: var(--muted);
      font-family: 'Cascadia Code', monospace;
    }
    .msg-tool .tool-name { color: var(--success); font-weight: 600; }

    /* Code blocks */
    .msg pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin: 6px 0;
      overflow-x: auto;
      font-size: 11px;
      font-family: 'Cascadia Code', monospace;
    }
    .msg code {
      background: rgba(201,168,76,0.1);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      font-family: 'Cascadia Code', monospace;
    }
    .msg pre code { background: none; padding: 0; }
    .msg strong { color: var(--gold); }
    .msg a { color: var(--gold); text-decoration: underline; }

    /* Context bar */
    .context-bar {
      padding: 6px 12px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s;
    }
    .context-bar:hover { color: var(--gold); }
    .context-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
    }

    /* Typing indicator */
    .typing {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .typing.active { display: flex; gap: 4px; align-items: center; }
    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 36px;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    .input-row textarea:focus { border-color: rgba(201,168,76,0.4); }
    .input-row textarea::placeholder { color: var(--muted); }
    .send-btn {
      background: linear-gradient(135deg, var(--gold), #A8893D);
      border: none;
      border-radius: 8px;
      color: #000;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover { box-shadow: 0 0 12px rgba(201,168,76,0.3); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .quick-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      padding: 4px 10px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 12px;
    }
    .welcome-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--gold), #A8893D);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 20px;
      color: #000;
    }
    .welcome h2 { font-size: 16px; font-weight: 700; }
    .welcome h2 span { color: var(--gold); }
    .welcome p { color: var(--muted); font-size: 12px; max-width: 240px; }
    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      max-width: 280px;
      margin-top: 8px;
    }
    .suggestion-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion-btn:hover { border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.04); }
    .suggestion-btn .label { color: var(--muted); font-size: 10px; margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">S</div>
      <div class="brand">Short<span>Stack</span></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btnContext" title="Read current page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="icon-btn" id="btnClear" title="Clear chat">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/></svg>
      </button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">S</div>
      <h2>Short<span>Stack</span> Agent</h2>
      <p>AI assistant that can see and interact with your browser. Ask me anything about this page.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendQuick('Summarize this page for me')">
          <div class="label">Page Analysis</div>
          Summarize this page for me
        </button>
        <button class="suggestion-btn" onclick="sendQuick('Find all the important links on this page')">
          <div class="label">Extract Data</div>
          Find all the important links
        </button>
        <button class="suggestion-btn" onclick="sendQuick('Help me fill out the form on this page')">
          <div class="label">Automation</div>
          Help me fill out a form
        </button>
      </div>
    </div>
    <div class="typing" id="typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <div class="context-bar" id="contextBar" onclick="readPage()">
    <div class="context-dot"></div>
    <span id="contextText">Click to read current page</span>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Ask about this page..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="quick-actions">
      <button class="quick-btn" onclick="sendQuick('What is this page about?')">About page</button>
      <button class="quick-btn" onclick="sendQuick('Find contact info')">Contacts</button>
      <button class="quick-btn" onclick="sendQuick('Extract pricing')">Pricing</button>
    </div>
  </div>

  <script>
    let conversationHistory = [];
    let pageContext = null;
    let isProcessing = false;

    const messagesEl = document.getElementById("messages");
    const welcomeEl = document.getElementById("welcome");
    const typingEl = document.getElementById("typing");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const contextBar = document.getElementById("contextBar");
    const contextText = document.getElementById("contextText");

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    async function readPage() {
      contextText.textContent = "Reading page...";
      chrome.runtime.sendMessage({ type: "GET_PAGE_CONTEXT" }, (res) => {
        if (res && !res.error) {
          pageContext = res;
          contextText.textContent = `Reading: ${res.title?.slice(0, 40) || res.url}`;
        } else {
          contextText.textContent = "Could not read page";
        }
      });
    }

    // Auto-read page on load
    readPage();

    function addMessage(role, content) {
      welcomeEl.style.display = "none";
      const div = document.createElement("div");
      div.className = `msg msg-${role}`;
      div.innerHTML = formatMarkdown(content);
      messagesEl.insertBefore(div, typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addToolMessage(name, result) {
      welcomeEl.style.display = "none";
      const div = document.createElement("div");
      div.className = "msg msg-tool";
      div.innerHTML = `<span class="tool-name">${name}</span> ${result.slice(0, 200)}`;
      messagesEl.insertBefore(div, typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function formatMarkdown(text) {
      return text
        .replace(/```(\w*)\n?([\s\S]*?)```/g, "<pre><code>$2</code></pre>")
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\n/g, "<br>");
    }

    function sendQuick(text) {
      inputEl.value = text;
      sendMessage();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isProcessing) return;

      isProcessing = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      inputEl.style.height = "auto";

      // Build message with page context if available
      let fullMessage = text;
      if (pageContext && conversationHistory.length === 0) {
        fullMessage = `[Page Context]\nTitle: ${pageContext.title}\nURL: ${pageContext.url}\nDescription: ${pageContext.metaDescription}\n\nHeadings:\n${pageContext.headings?.map(h => `${h.level}: ${h.text}`).join("\n") || "None"}\n\nPage text (first 2000 chars):\n${pageContext.bodyText?.slice(0, 2000) || "N/A"}\n\nLinks: ${pageContext.links?.map(l => l.text + " -> " + l.href).join(", ").slice(0, 500) || "None"}\n\n[User Question]\n${text}`;
      }

      addMessage("user", text);
      conversationHistory.push({ role: "user", content: fullMessage });

      typingEl.classList.add("active");

      try {
        const response = await new Promise((resolve, reject) => {
          chrome.runtime.sendMessage(
            { type: "AI_CHAT", messages: conversationHistory },
            (res) => {
              if (chrome.runtime.lastError) reject(chrome.runtime.lastError);
              else resolve(res);
            }
          );
        });

        typingEl.classList.remove("active");

        if (response.error) {
          addMessage("system", "Error: " + response.error);
        } else if (response.text) {
          addMessage("assistant", response.text);
          conversationHistory.push({ role: "assistant", content: response.text });
        }

        if (response.toolLogs) {
          response.toolLogs.forEach((log) => {
            addToolMessage(log.name, log.result);
          });
        }
      } catch (err) {
        typingEl.classList.remove("active");
        addMessage("system", "Connection error: " + String(err));
      }

      isProcessing = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    document.getElementById("btnClear").addEventListener("click", () => {
      conversationHistory = [];
      pageContext = null;
      messagesEl.querySelectorAll(".msg").forEach((el) => el.remove());
      welcomeEl.style.display = "flex";
      readPage();
    });

    document.getElementById("btnContext").addEventListener("click", readPage);
  </script>
</body>
</html>
