version: "3.8"

# ShortStack OS - private Syncthing relay server
# -----------------------------------------------
# Runs an instance of strelaysrv (Syncthing Relay Server) in "private pool"
# mode. Setting STRELAYSRV_POOLS to an empty string opts OUT of the public
# relay directory, so only clients that know our relay URL will use it.
#
# Why self-host?
#   * Faster transfers for teammates on the same agency network
#   * Predictable bandwidth / no throttling by community relays
#   * Keeps sync traffic within infra you control
#
# Ports
#   22067/tcp - relay protocol (clients connect here, TLS)
#   22070/tcp - status / metrics JSON endpoint (useful for health checks)
#
# See README.md in this directory for step-by-step setup.

services:
  strelaysrv:
    image: syncthing/relaysrv:latest
    container_name: shortstack-strelaysrv
    restart: unless-stopped
    ports:
      - "22067:22067"
      - "22070:22070"
    environment:
      # Empty pool list = private relay, do not advertise to the public pool.
      STRELAYSRV_POOLS: ""
      # Uncomment to pin a known provider string shown to connecting clients.
      # STRELAYSRV_PROVIDER: "ShortStack OS private relay"
    volumes:
      - strelaysrv-data:/var/strelaysrv
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:22070/status"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  strelaysrv-data:
    name: shortstack-strelaysrv-data
