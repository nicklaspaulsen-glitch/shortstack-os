<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ShortStack Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #06080c; --surface: #0c1017; --border: #1e2a3a; --gold: #C9A84C; --text: #e2e8f0; --muted: #64748b; --success: #10b981; --danger: #f43f5e; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Titlebar */
  .titlebar { -webkit-app-region: drag; height: 36px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 8px; shrink: 0; }
  .titlebar .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); }
  .titlebar span { font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 0.5px; }
  .titlebar .badge { font-size: 8px; color: var(--muted); margin-left: auto; -webkit-app-region: no-drag; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--gold); color: #000; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.assistant pre { background: #0a0e14; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin: 6px 0; overflow-x: auto; font-size: 11px; font-family: 'Cascadia Code', 'Fira Code', monospace; }
  .msg.assistant code { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; }

  .msg.tool { align-self: flex-start; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--muted); max-width: 90%; }
  .msg.tool .tool-name { color: var(--gold); font-weight: 600; margin-bottom: 2px; }
  .msg.tool .tool-result { color: var(--success); }
  .msg.tool .tool-error { color: var(--danger); }

  .msg.system { align-self: center; color: var(--muted); font-size: 11px; background: transparent; padding: 4px; }

  .typing { align-self: flex-start; color: var(--muted); font-size: 12px; padding: 8px 14px; }
  .typing::after { content: '...'; animation: dots 1.5s infinite; }
  @keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }

  /* Input */
  .input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg); display: flex; gap: 8px; align-items: flex-end; }
  .input-area textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 40px; max-height: 120px; line-height: 1.4; transition: border-color 0.2s; }
  .input-area textarea:focus { border-color: rgba(201,168,76,0.4); }
  .input-area textarea::placeholder { color: var(--muted); }
  .send-btn { width: 38px; height: 38px; border-radius: 10px; border: none; background: var(--gold); color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .send-btn:hover { box-shadow: 0 0 12px rgba(201,168,76,0.3); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  /* Welcome */
  .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .welcome h2 { color: var(--gold); font-size: 18px; font-weight: 700; }
  .welcome p { color: var(--muted); font-size: 12px; text-align: center; max-width: 280px; line-height: 1.5; }
  .welcome .workspace { font-size: 10px; color: var(--border); margin-top: 8px; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; }
  .suggestions button { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--muted); font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .suggestions button:hover { border-color: var(--gold); color: var(--gold); }
</style>
</head>
<body>
  <div class="titlebar">
    <div class="dot"></div>
    <span>ShortStack Agent</span>
    <div class="badge">Powered by ShortStack</div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>ShortStack Agent</h2>
      <p>Your AI assistant that works directly on your machine. Ask me to create files, run commands, build projects, or automate tasks.</p>
      <div class="workspace" id="workspace-path"></div>
      <div class="suggestions">
        <button onclick="suggest('List all files in my workspace')">Show my files</button>
        <button onclick="suggest('Create a new project folder')">New project</button>
        <button onclick="suggest('What can you help me with?')">What can you do?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask your agent anything..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const welcomeEl = document.getElementById("welcome");
  let conversationHistory = [];
  let isProcessing = false;

  // Load workspace path
  window.agent.getWorkspace().then(p => {
    document.getElementById("workspace-path").textContent = "Workspace: " + p;
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // Enter to send, Shift+Enter for newline
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  function suggest(text) {
    inputEl.value = text;
    send();
  }

  function addMessage(role, content, extra) {
    if (welcomeEl) welcomeEl.remove();

    const div = document.createElement("div");
    div.className = "msg " + role;

    if (role === "tool") {
      div.innerHTML = `<div class="tool-name">${extra.name}</div><div class="${extra.success ? 'tool-result' : 'tool-error'}">${escapeHtml(content).slice(0, 500)}</div>`;
    } else {
      div.innerHTML = formatContent(content);
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.textContent = "Thinking";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatContent(text) {
    // Simple markdown: code blocks, inline code, bold
    let html = escapeHtml(text);
    // Code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code style="background:#0a0e14;padding:2px 5px;border-radius:4px;">$1</code>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Newlines
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || isProcessing) return;

    isProcessing = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    addMessage("user", text);
    conversationHistory.push({ role: "user", content: text });

    addTyping();

    try {
      const result = await window.agent.chat(conversationHistory);

      removeTyping();

      if (result.error) {
        addMessage("system", "Error: " + result.error);
      } else {
        // Show tool executions if any
        if (result.toolLogs) {
          for (const log of result.toolLogs) {
            addMessage("tool", log.result, { name: log.name, success: log.success });
          }
        }

        // Show final response
        if (result.text) {
          addMessage("assistant", result.text);
          conversationHistory.push({ role: "assistant", content: result.text });
        }
      }
    } catch (err) {
      removeTyping();
      addMessage("system", "Connection error. Please try again.");
    }

    isProcessing = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  // Listen for tool execution updates
  window.agent.onToolExec((data) => {
    addMessage("tool", data.result, { name: data.name, success: data.success });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  inputEl.focus();
</script>
</body>
</html>
